  <line x1="79" y1="29" x2="79" y2="57" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="94" y1="29" x2="84" y2="57" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="53" y1="37" x2="70" y2="58" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="66" y1="37" x2="74" y2="58" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="79" y1="37" x2="79" y2="58" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="92" y1="37" x2="84" y2="58" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="105" y1="37" x2="88" y2="58" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="64" y1="45" x2="74" y2="59" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
