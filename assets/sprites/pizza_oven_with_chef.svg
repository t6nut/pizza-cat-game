  <line x1="38" y1="85" x2="120" y2="85" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="94" x2="120" y2="94" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="103" x2="120" y2="103" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
  <line x1="38" y1="112" x2="120" y2="112" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>

  <!-- Vertical brick seams (staggered rows) -->
  <!-- row 76-85 -->
  <line x1="58" y1="76" x2="58" y2="85" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="79" y1="76" x2="79" y2="85" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="100" y1="76" x2="100" y2="85" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <!-- row 85-94 -->
  <line x1="48" y1="85" x2="48" y2="94" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="69" y1="85" x2="69" y2="94" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="90" y1="85" x2="90" y2="94" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="111" y1="85" x2="111" y2="94" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
