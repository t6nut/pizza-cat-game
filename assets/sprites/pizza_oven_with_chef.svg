  <line x1="79" y1="94" x2="79" y2="103" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="100" y1="94" x2="100" y2="103" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <!-- row 103-112 -->
  <line x1="48" y1="103" x2="48" y2="112" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="69" y1="103" x2="69" y2="112" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="90" y1="103" x2="90" y2="112" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="111" y1="103" x2="111" y2="112" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <!-- row 112-114 -->
  <line x1="58" y1="112" x2="58" y2="114" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="79" y1="112" x2="79" y2="114" stroke="#ffffff" stroke-width="1" opacity="0.55"/>
  <line x1="100" y1="112" x2="100" y2="114" stroke="#ffffff" stroke-width="1" opacity="0.55"/>

  <!-- ===== OVEN DOOR ARCH FRAME ===== -->
  <ellipse cx="79" cy="86" rx="25" ry="12" fill="#dd2800"/>
  <rect x="54" y="86" width="50" height="26" fill="#dd2800"/>

  <!-- ===== OVEN DOOR OPENING (dark cavity) ===== -->
  <ellipse cx="79" cy="88" rx="20" ry="9" fill="#1a0800"/>
  <rect x="59" y="88" width="40" height="23" fill="#1a0800"/>

  <!-- Static flame (Phaser animated overlay will cover this in-game) -->
  <ellipse cx="79" cy="108" rx="14" ry="4" fill="#ff4400" opacity="0.9"/>
  <ellipse cx="79" cy="103" rx="10" ry="6" fill="#ffaa00" opacity="0.9"/>
  <polygon points="74,98 79,90 84,98" fill="#fff060" opacity="0.95"/>

  <!-- ===== OVEN BASE PLATE & LEGS ===== -->
  <rect x="34" y="114" width="90" height="7" fill="#882000" rx="2"/>
  <rect x="48" y="119" width="12" height="5" fill="#661800"/>
  <rect x="98" y="119" width="12" height="5" fill="#661800"/>
  </g>

  <!-- ===== CHEF MARIO (right side, left arm grips oven) ===== -->
  <g transform="translate(-6 -8)">

  <!-- Hat puff dome -->
  <circle cx="158" cy="59" r="14" fill="#f6f6f6"/>
  <circle cx="158" cy="59" r="14" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Hat cylinder body -->
  <rect x="148" y="69" width="20" height="17" fill="#f6f6f6" rx="2"/>
  <!-- Hat brim -->
  <rect x="141" y="84" width="34" height="6" fill="#e8e8e8" rx="3"/>

  <!-- Head -->
  <circle cx="158" cy="99" r="13" fill="#f5c49e"/>
  <!-- Ears -->
  <ellipse cx="146" cy="99" rx="4" ry="5" fill="#e8a870"/>
  <ellipse cx="170" cy="99" rx="4" ry="5" fill="#e8a870"/>

  <!-- Curved eyebrows -->
  <path d="M148 92 Q152.5 88.8 157 92" stroke="#1a0e08" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M163 92 Q167.5 88.8 172 92" stroke="#1a0e08" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="153" cy="95" r="2.8" fill="#2a1a08"/>
  <circle cx="163" cy="95" r="2.8" fill="#2a1a08"/>
  <circle cx="152.2" cy="94.2" r="1" fill="#fff" opacity="0.75"/>
  <circle cx="162.2" cy="94.2" r="1" fill="#fff" opacity="0.75"/>

  <!-- Nose -->
  <ellipse cx="158" cy="100" rx="4" ry="3.5" fill="#e08060"/>

  <!-- Raised even more and wider mustache (more chin reveal) -->
  <ellipse cx="151" cy="99" rx="12.6" ry="3.1" fill="#1a0e08"/>
  <ellipse cx="165" cy="99" rx="12.6" ry="3.1" fill="#1a0e08"/>
  <ellipse cx="158" cy="97" rx="5" ry="2.1" fill="#f5c49e"/>
  <ellipse cx="139.5" cy="98" rx="5.2" ry="2.4" fill="#1a0e08" transform="rotate(-18 139.5 98)"/>
  <ellipse cx="176.5" cy="98" rx="5.2" ry="2.4" fill="#1a0e08" transform="rotate(18 176.5 98)"/>

  <!-- Chin under mustache -->
  <ellipse cx="158" cy="111" rx="7" ry="4.2" fill="#e8a870" opacity="0.92"/>

  <!-- Body (fatter stomach) -->
  <ellipse cx="158" cy="124" rx="24" ry="19" fill="#f6f6f6"/>
  <!-- Buttons -->
  <circle cx="154" cy="117" r="1.6" fill="#111111"/>
  <circle cx="162" cy="117" r="1.6" fill="#111111"/>
  <circle cx="154" cy="125" r="1.6" fill="#111111"/>
  <circle cx="162" cy="125" r="1.6" fill="#111111"/>

  <!-- LEFT ARM reaching to grip oven right edge -->
  <!-- Upper arm (sleeve, white) -->
  <ellipse cx="145" cy="119" rx="7" ry="11" fill="#f6f6f6" transform="rotate(-35 145 119)"/>
  <!-- Forearm continuing toward oven -->
  <ellipse cx="130" cy="112" rx="6" ry="9" fill="#f6f6f6" transform="rotate(-25 130 112)"/>
  <!-- Hand gripping oven right wall -->
  <circle cx="122" cy="104" r="6" fill="#f5c49e"/>
  <!-- Thumb -->
  <ellipse cx="111" cy="100" rx="3.2" ry="2.2" fill="#e8a870" transform="rotate(-30 111 100)"/>

  <!-- RIGHT ARM (relaxed, slightly raised) -->
  <ellipse cx="170" cy="117" rx="6.5" ry="10" fill="#f6f6f6" transform="rotate(20 170 117)"/>
  <!-- Right hand -->
  <circle cx="177" cy="108" r="5.5" fill="#f5c49e"/>

  <!-- Small black feet -->
  <ellipse cx="150" cy="141" rx="3.8" ry="2" fill="#111"/>
  <ellipse cx="166" cy="141" rx="3.8" ry="2" fill="#111"/>
  </g>

</svg>
