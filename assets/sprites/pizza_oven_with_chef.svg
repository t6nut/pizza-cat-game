  <!-- Brick lines on dome (clipped to dome shape) -->
  <g clip-path="url(#domeClip)">
    <line x1="38" y1="68" x2="120" y2="68" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="38" y1="76" x2="120" y2="76" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
    <line x1="58" y1="56" x2="58" y2="69" stroke="#ffffff" stroke-width="1" opacity="0.45"/>
    <line x1="79" y1="54" x2="79" y2="69" stroke="#ffffff" stroke-width="1" opacity="0.45"/>
    <line x1="100" y1="56" x2="100" y2="69" stroke="#ffffff" stroke-width="1" opacity="0.45"/>
    <line x1="48" y1="68" x2="48" y2="77" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
    <line x1="69" y1="68" x2="69" y2="77" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
    <line x1="90" y1="68" x2="90" y2="77" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
    <line x1="111" y1="68" x2="111" y2="77" stroke="#ffffff" stroke-width="1" opacity="0.4"/>
  </g>

