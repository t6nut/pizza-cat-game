<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120">

  <!-- ===== PIZZA OVEN WITH BALLOONS ===== -->

  <!-- Balloon strings -->
  <line x1="25" y1="36" x2="38" y2="56" stroke="#998877" stroke-width="1.3" opacity="0.8"/>
  <line x1="62" y1="31" x2="55" y2="56" stroke="#998877" stroke-width="1.3" opacity="0.8"/>
  <line x1="97" y1="34" x2="72" y2="56" stroke="#998877" stroke-width="1.3" opacity="0.8"/>

  <!-- Left balloon (red) -->
  <circle cx="25" cy="20" r="17" fill="#e83030"/>
  <ellipse cx="18" cy="12" rx="6" ry="4" fill="#ff9090" opacity="0.6"/>
  <ellipse cx="25" cy="36" rx="4" ry="2" fill="#b02020"/>

  <!-- Center balloon (yellow) -->
  <circle cx="62" cy="13" r="19" fill="#f5d020"/>
  <ellipse cx="55" cy="5" rx="7" ry="5" fill="#fff080" opacity="0.65"/>
  <ellipse cx="62" cy="31" rx="5" ry="2.5" fill="#c0a000"/>

  <!-- Right balloon (blue) -->
  <circle cx="97" cy="18" r="17" fill="#3a7add"/>
  <ellipse cx="90" cy="10" rx="6" ry="4" fill="#90bfff" opacity="0.6"/>
  <ellipse cx="97" cy="34" rx="4" ry="2" fill="#2050a0"/>

  <!-- Chimney cap -->
  <rect x="44" y="34" width="22" height="5" fill="#4a4545" rx="2"/>
  <!-- Chimney shaft -->
  <rect x="47" y="38" width="16" height="20" fill="#5a5555" rx="1"/>

  <!-- Oven body (stone grey-brown) -->
  <rect x="8" y="56" width="110" height="54" fill="#8a8278" rx="3"/>

  <!-- Brick seams (horizontal) -->
  <rect x="8" y="65" width="110" height="2.5" fill="#5e584e" opacity="0.4"/>
  <rect x="8" y="76" width="110" height="2.5" fill="#5e584e" opacity="0.4"/>
  <rect x="8" y="87" width="110" height="2.5" fill="#5e584e" opacity="0.4"/>
  <rect x="8" y="98" width="110" height="2.5" fill="#5e584e" opacity="0.4"/>

  <!-- Brick seams (vertical, staggered rows) -->
  <rect x="30" y="56" width="1.5" height="11" fill="#5e584e" opacity="0.35"/>
  <rect x="57" y="56" width="1.5" height="11" fill="#5e584e" opacity="0.35"/>
  <rect x="84" y="56" width="1.5" height="11" fill="#5e584e" opacity="0.35"/>
  <rect x="20" y="67" width="1.5" height="11" fill="#5e584e" opacity="0.35"/>
  <rect x="47" y="67" width="1.5" height="11" fill="#5e584e" opacity="0.35"/>
  <rect x="74" y="67" width="1.5" height="11" fill="#5e584e" opacity="0.35"/>
  <rect x="101" y="67" width="1.5" height="11" fill="#5e584e" opacity="0.35"/>

  <!-- Oven door frame (lighter stone arch) -->
  <ellipse cx="63" cy="75" rx="30" ry="10" fill="#a0988e"/>
  <rect x="33" y="75" width="60" height="33" fill="#a0988e"/>

  <!-- Oven door opening (dark) -->
  <ellipse cx="63" cy="77" rx="24" ry="8" fill="#1a0d08"/>
  <rect x="39" y="77" width="48" height="30" fill="#1a0d08"/>

  <!-- Flame inside oven -->
  <ellipse cx="63" cy="100" rx="18" ry="6" fill="#ff5500" opacity="0.9"/>
  <ellipse cx="63" cy="94" rx="12" ry="8" fill="#ffaa00" opacity="0.9"/>
  <polygon points="57,88 63,76 69,88" fill="#ffe060" opacity="0.95"/>

  <!-- Oven base plate -->
  <rect x="4" y="108" width="118" height="7" fill="#686058" rx="2"/>
  <!-- Oven legs -->
  <rect x="16" y="113" width="14" height="6" fill="#545048"/>
  <rect x="96" y="113" width="14" height="6" fill="#545048"/>

  <!-- ===== CHEF MARIO ===== -->

  <!-- Chef hat: puff top (big round dome) -->
  <circle cx="162" cy="34" r="15" fill="#f4f4f4"/>
  <circle cx="162" cy="34" r="15" fill="none" stroke="#e0e0e0" stroke-width="1"/>
  <!-- Hat body (tall white cylinder) -->
  <rect x="151" y="44" width="22" height="20" fill="#f4f4f4" rx="2"/>
  <!-- Hat brim (wide, slightly grey) -->
  <rect x="145" y="62" width="34" height="7" fill="#e8e8e8" rx="3"/>

  <!-- Head (skin tone) -->
  <circle cx="162" cy="79" r="14" fill="#f5c9a0"/>
  <!-- Ears -->
  <ellipse cx="149" cy="79" rx="4.5" ry="5.5" fill="#e8b890"/>
  <ellipse cx="175" cy="79" rx="4.5" ry="5.5" fill="#e8b890"/>

  <!-- Thick black eyebrows (very prominent, Mario-style) -->
  <rect x="152" y="68" width="10" height="4.5" fill="#1a1010" rx="2"/>
  <rect x="164" y="68" width="10" height="4.5" fill="#1a1010" rx="2"/>

  <!-- Eyes (warm dark brown) -->
  <circle cx="157" cy="75" r="3" fill="#2a1808"/>
  <circle cx="167" cy="75" r="3" fill="#2a1808"/>
  <circle cx="156" cy="74.2" r="1.1" fill="#fff" opacity="0.75"/>
  <circle cx="166" cy="74.2" r="1.1" fill="#fff" opacity="0.75"/>

  <!-- Nose (big, round, slightly red) -->
  <ellipse cx="162" cy="80" rx="4.5" ry="4" fill="#e89a7a"/>

  <!-- Rosy cheeks -->
  <ellipse cx="149" cy="82" rx="4.5" ry="3" fill="#e89090" opacity="0.45"/>
  <ellipse cx="175" cy="82" rx="4.5" ry="3" fill="#e89090" opacity="0.45"/>

  <!-- BIG BUSHY MUSTACHE (the Mario signature) -->
  <ellipse cx="155" cy="87" rx="10" ry="6" fill="#1a1010"/>
  <ellipse cx="169" cy="87" rx="10" ry="6" fill="#1a1010"/>
  <!-- Centre gap (skin showing between mustache halves) -->
  <ellipse cx="162" cy="85" rx="4" ry="3" fill="#f5c9a0"/>
  <!-- Curl tips -->
  <ellipse cx="146" cy="84" rx="5" ry="3.5" fill="#1a1010" transform="rotate(-30 146 84)"/>
  <ellipse cx="178" cy="84" rx="5" ry="3.5" fill="#1a1010" transform="rotate(30 178 84)"/>

  <!-- Body (white chef jacket, rotund) -->
  <ellipse cx="162" cy="104" rx="16" ry="15" fill="#f4f4f4"/>
  <!-- Red front panel (Mario belly) -->
  <rect x="156" y="96" width="12" height="16" fill="#cc2828" opacity="0.55" rx="2"/>
  <!-- Double-breasted buttons -->
  <circle cx="159" cy="98" r="1.8" fill="#d8d8d8"/>
  <circle cx="165" cy="98" r="1.8" fill="#d8d8d8"/>
  <circle cx="159" cy="105" r="1.8" fill="#d8d8d8"/>
  <circle cx="165" cy="105" r="1.8" fill="#d8d8d8"/>

  <!-- Left arm (down, resting by side) -->
  <ellipse cx="148" cy="106" rx="6" ry="10" fill="#f4f4f4" transform="rotate(-12 148 106)"/>
  <ellipse cx="143" cy="114" rx="4.5" ry="4" fill="#f5c9a0"/>

  <!-- Right arm (raised UP — throwing pose!) -->
  <!-- Upper arm angled upward-right -->
  <ellipse cx="178" cy="97" rx="6" ry="10" fill="#f4f4f4" transform="rotate(42 178 97)"/>
  <!-- Forearm continuing up -->
  <ellipse cx="187" cy="84" rx="5" ry="8" fill="#f4f4f4" transform="rotate(24 187 84)"/>
  <!-- Throwing hand/fist -->
  <circle cx="193" cy="73" r="7" fill="#f5c9a0"/>

  <!-- Pizza slice held in throwing hand -->
  <polygon points="193,66 183,76 203,76" fill="#f5d020" opacity="0.92"/>
  <!-- Pizza toppings (small circles) -->
  <circle cx="187" cy="73" r="2" fill="#d03020" opacity="0.85"/>
  <circle cx="193" cy="71" r="2" fill="#d03020" opacity="0.85"/>
  <circle cx="199" cy="74" r="2" fill="#d03020" opacity="0.85"/>
  <!-- Cheese edge on pizza -->
  <line x1="183" y1="76" x2="203" y2="76" stroke="#e8c840" stroke-width="2"/>

</svg>
