  <line x1="94" y1="45" x2="84" y2="59" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="72" y1="53" x2="77" y2="60" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>
  <line x1="86" y1="53" x2="81" y2="60" stroke="#9a8870" stroke-width="1.1" opacity="0.85"/>

  <!-- Row 1 (1) -->
  <circle cx="79" cy="12" r="9" fill="#f5d020"/>
  <ellipse cx="75" cy="8" rx="3.5" ry="2.2" fill="#ffffa0" opacity="0.7"/>

  <!-- Row 2 (3) -->
  <circle cx="64" cy="22" r="8" fill="#e03030"/>
  <circle cx="79" cy="22" r="8" fill="#28c040"/>
  <circle cx="94" cy="22" r="8" fill="#3468d8"/>

  <!-- Row 3 (5) -->
  <circle cx="53" cy="31" r="7.5" fill="#9030c0"/>
  <circle cx="66" cy="31" r="7.5" fill="#f28c28"/>
  <circle cx="79" cy="31" r="7.5" fill="#f5d020"/>
  <circle cx="92" cy="31" r="7.5" fill="#20b0b8"/>
  <circle cx="105" cy="31" r="7.5" fill="#e03030"/>

  <!-- Row 4 (3) -->
  <circle cx="64" cy="40" r="7" fill="#3468d8"/>
  <circle cx="79" cy="40" r="7" fill="#9030c0"/>
  <circle cx="94" cy="40" r="7" fill="#28c040"/>

  <!-- Row 5 (2) -->
  <circle cx="72" cy="48" r="6.5" fill="#e03030"/>
  <circle cx="86" cy="48" r="6.5" fill="#f5d020"/>
